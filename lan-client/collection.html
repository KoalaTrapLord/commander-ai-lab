<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Commander AI Lab — Collection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="global.css" />
    <link rel="stylesheet" href="collection.css" />
    <style>
      /* No nav bar when embedded in LAN client iframe */
      :root { --nav-height: 0px; }
    </style>
</head>
<body>
    <!-- nav.js removed — collection is embedded via iframe in the LAN client -->
    <div id="collection-container"></div>
    <script>
      window.LAB_API_BASE = window.LAB_API_BASE || '';
    </script>
    <script src="collection.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            Collection.init();
        });
    </script>
        <!-- Card Preview Popup (hover tooltip) -->
    <div id="coll-card-preview" style="display:none; position:fixed; pointer-events:none; z-index:9999;">
        <img id="coll-card-preview-img" src="" alt="Card preview" style="width:220px; border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,0.7);" />
    </div>
</body>
</html>
