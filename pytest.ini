[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test* Bench*
python_functions = test_*

# Asyncio mode for pytest-asyncio
asyncio_mode = auto

# Markers
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    integration: marks integration tests
    benchmark: marks benchmark tests
    unit: marks fast unit tests

# Output
addopts =
    --tb=short
    -q

# Coverage (used when running: pytest --cov)
# pip install pytest-cov
# pytest --cov=src/commander_ai_lab --cov-report=term-missing
